<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Mobile Chess</title>
    
    <!-- External Libraries (CDN) -->
    <!-- jQuery (Required for Chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Chessboard.js JS -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <!-- Chess.js (Game Logic) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        /* Mobile-Friendly CSS */
        body {
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Prevent scrolling */
        }

        h1 {
            margin: 10px 0;
            font-size: 1.5rem;
        }

        #board-container {
            width: 95vw;
            max-width: 500px;
            /* Aspect ratio 1:1 for square board */
            aspect-ratio: 1 / 1; 
            margin-bottom: 20px;
        }

        /* Important: Prevents scrolling on mobile when dragging pieces */
        #board {
            width: 100%;
            height: 100%;
            touch-action: none; 
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        button:active {
            background-color: #45a049;
            transform: translateY(2px);
        }

        button.secondary {
            background-color: #f44336;
        }

        #status {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ddd;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Mobile Chess</h1>
    
    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="status">White's Turn</div>

    <div class="controls">
        <button onclick="undoMove()">Undo</button>
        <button class="secondary" onclick="restartGame()">Restart</button>
    </div>

    <script>
        // --- Game Configuration ---
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        // --- Voice Feedback System ---
        // Uses browser native SpeechSynthesis (No API Key needed)
        function speak(text) {
            // Cancel any currently playing speech to make it snappy
            window.speechSynthesis.cancel();

            var utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.2; // Speed: 1.0 is normal, 1.2 is slightly faster
            utterance.pitch = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // --- Game Logic: Drag & Drop ---
        function onDragStart(source, piece, position, orientation) {
            // Do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // Only pick up pieces for the side to move
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            // 1. Check if move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: always promote to a queen for simplicity
            });

            // 2. Illegal move? Snapback.
            if (move === null) return 'snapback';

            // 3. Voice Feedback Logic
            // We check the state AFTER the move is applied
            
            // Check for Capture
            if (move.captured) {
                speak("Nice capture");
            } 
            // Check for Check
            else if (game.in_check()) {
                speak("Check");
            } 
            // Normal Move
            else {
                speak("Good move");
            }

            // Check for Game Over conditions
            if (game.game_over()) {
                speak("Game over");
                updateStatus();
            } else {
                updateStatus();
            }
        }

        // Update the board position after the piece snap
        // for castling, en passant, pawn promotion
        function onSnapEnd() {
            board.position(game.fen());
        }

        // --- UI Controls ---
        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + "'s turn";
                if (game.in_check()) {
                    status += ', ' + moveColor + ' is in check';
                }
            }

            $status.text(status);
        }

        function restartGame() {
            game.reset();
            board.start();
            updateStatus();
            speak("New game started");
        }

        function undoMove() {
            game.undo(); // undo the last move
            board.position(game.fen());
            updateStatus();
            // Optional: Don't speak on undo to keep flow smooth
        }

        // --- Initialization ---
        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            orientation: 'white' // White pieces at the bottom
        };

        // Initialize Board
        board = Chessboard('board', config);
        updateStatus();

        // Handle window resize to keep board responsive
        $(window).resize(board.resize);
    </script>
</body>
</html>
